<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salty Reef - Calcium</title>

<style>
body {
  font-family: Arial;
  background:#0b1f2a;
  color:white;
  margin:0;
  padding:20px;
}

.container {
  max-width:500px;
  margin:auto;
}

.card {
  background:#112c3a;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
}

h1 { margin:0 0 10px; }

input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#0b1f2a;
  color:white;
  margin-top:10px;
}

.button {
  display:block;
  text-align:center;
  padding:12px;
  border-radius:10px;
  text-decoration:none;
  margin-top:10px;
}

.primary {
  background:#00c2ff;
  color:black;
  font-weight:bold;
}

.secondary {
  background:#112c3a;
  color:white;
  border:1px solid #00c2ff;
}

.status {
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>
<div class="container">

<div class="card">
  <h1>Calcium meten</h1>
  <p>Voer je calcium waarde in (ppm)</p>
</div>

<div class="card">
  <input id="value" type="number" step="1" placeholder="Bijv. 430">
  <button class="button primary" onclick="save()">Opslaan</button>
  <div id="status" class="status"></div>
</div>

<a class="button secondary" href="../Trends/">Bekijk trends</a>
<a class="button secondary" href="https://www.facebook.com/people/Salty-Reef/61583895151144/" target="_blank">
  Bezoek Salty Reef
</a>

</div>

<script>
const key="ca_notes";

function check(value){
  let status = "";
  let color = "";

  if(value < 400){
    status = "Te laag";
    color = "red";
  }
  else if(value <= 460){
    status = "Goed";
    color = "lime";
  }
  else{
    status = "Te hoog";
    color = "orange";
  }

  document.getElementById("status").innerHTML =
    `<span style="color:${color}">Status: ${status}</span>`;
}

function save(){
  let value = parseFloat(document.getElementById("value").value);
  if(isNaN(value)) return;

  let data = JSON.parse(localStorage.getItem(key) || "[]");

  data.unshift({
    value: value,
    date: new Date().toLocaleString("nl-NL")
  });

  localStorage.setItem(key, JSON.stringify(data));

  check(value);
}
</script>

</body>
</html>
