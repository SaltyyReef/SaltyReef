<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salty Reef - PO4 ULR</title>

<style>
body { font-family: Arial; background:#0b1f2a; color:white; margin:0; padding:20px; }
.container { max-width:500px; margin:auto; }
.card { background:#112c3a; padding:20px; border-radius:12px; margin-bottom:15px; }
h1 { margin:0 0 10px; }
input {
  width:100%; padding:12px; border-radius:10px; border:none;
  background:#0b1f2a; color:white; margin-top:10px;
}
.button {
  display:block; text-align:center; padding:12px; border-radius:10px;
  text-decoration:none; margin-top:10px;
}
.primary { background:#00c2ff; color:black; font-weight:bold; }
.secondary { background:#112c3a; color:white; border:1px solid #00c2ff; }
.status { margin-top:10px; font-weight:bold; }
.small { color:#b9d7e0; font-size:14px; }
</style>
</head>

<body>
<div class="container">

<div class="card">
  <h1>PO4 meten</h1>
  <p>Hanna Phosphorus ULR</p>
  <p class="small">Voer de Hanna waarde in als <b>ppb fosfor</b>. De pagina rekent dit om naar ppm PO4.</p>
</div>

<div class="card">
  <input id="value" type="number" step="1" placeholder="Bijv. 25 ppb">
  <button class="button primary" onclick="save()">Opslaan</button>
  <div id="result" class="status"></div>
  <div id="status" class="status"></div>
</div>

<a class="button secondary" href="../Trends/">Bekijk trends</a>
<a class="button secondary" href="https://www.facebook.com/people/Salty-Reef/61583895151144/" target="_blank">
  Bezoek Salty Reef
</a>

</div>

<script>
const key = "po4_notes";

function toPO4(ppb){
  return +(ppb * 3.066 / 1000).toFixed(3);
}

function check(po4){
  let status = "";
  let color = "";

  if(po4 < 0.03){
    status = "Te laag";
    color = "red";
  }
  else if(po4 <= 0.10){
    status = "Goed";
    color = "lime";
  }
  else{
    status = "Te hoog";
    color = "orange";
  }

  document.getElementById("status").innerHTML =
    `<span style="color:${color}">Status: ${status}</span>`;
}

function save(){
  let ppb = parseFloat(document.getElementById("value").value);
  if(isNaN(ppb)) return;

  let po4 = toPO4(ppb);

  document.getElementById("result").innerHTML =
    ppb + " ppb P = " + po4 + " ppm PO4";

  let data = JSON.parse(localStorage.getItem(key) || "[]");

  data.unshift({
    value: po4,
    ppb: ppb,
    date: new Date().toLocaleString("nl-NL")
  });

  localStorage.setItem(key, JSON.stringify(data));

  check(po4);
}
</script>

</body>
</html>
