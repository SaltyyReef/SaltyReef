<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salty Reef - Trends</title>

<style>
body { font-family: Arial; background:#0b1f2a; color:white; margin:0; padding:20px; }
.container { max-width:700px; margin:auto; }
.card { background:#112c3a; padding:20px; border-radius:12px; margin-bottom:15px; }
h1, h2 { margin-top:0; }
canvas { width:100%; height:240px; background:#0b1f2a; border-radius:10px; }
.small { color:#b9d7e0; font-size:14px; }
.button {
  display:block; text-align:center; padding:12px;
  border-radius:8px; text-decoration:none; margin-top:10px;
  background:#00c2ff; color:black; font-weight:bold;
}
</style>
</head>

<body>
<div class="container">

<div class="card">
  <h1>Salty Reef Trends</h1>
</div>

<div class="card">
  <h2>PO4</h2>
  <canvas id="po4Chart"></canvas>
  <p id="po4Info" class="small"></p>
</div>

<a class="button" href="../">Terug naar startpagina</a>

</div>

<script>
function getData(){
  return JSON.parse(localStorage.getItem("po4_notes") || "[]");
}

function drawChart(data){
  const canvas = document.getElementById("po4Chart");
  const info = document.getElementById("po4Info");
  const ctx = canvas.getContext("2d");

  canvas.width = canvas.clientWidth * 2;
  canvas.height = 240 * 2;

  const w = canvas.width;
  const h = canvas.height;
  const pad = 50;

  ctx.clearRect(0,0,w,h);

  if(data.length < 2){
    info.textContent = "Minimaal 2 metingen nodig";
    return;
  }

  const values = data.map(d => parseFloat(d.value));
  let min = Math.min(...values);
  let max = Math.max(...values);

  if(min === max){
    min -= 1;
    max += 1;
  }

  function x(i){
    return pad + (i / (data.length - 1)) * (w - pad * 2);
  }

  function y(v){
    return h - pad - ((v - min) / (max - min)) * (h - pad * 2);
  }

  ctx.strokeStyle = "#00c2ff";
  ctx.lineWidth = 4;
  ctx.beginPath();

  values.forEach((v,i)=>{
    if(i === 0) ctx.moveTo(x(i), y(v));
    else ctx.lineTo(x(i), y(v));
  });

  ctx.stroke();

  ctx.fillStyle = "#00c2ff";
  values.forEach((v,i)=>{
    ctx.beginPath();
    ctx.arc(x(i), y(v), 6, 0, Math.PI * 2);
    ctx.fill();
  });

  // highlight laatste punt
  const last = values[values.length - 1];
  ctx.fillStyle = "lime";
  ctx.beginPath();
  ctx.arc(x(values.length - 1), y(last), 10, 0, Math.PI * 2);
  ctx.fill();

  // labels
  ctx.fillStyle = "#b9d7e0";
  ctx.font = "22px Arial";
  ctx.fillText(max.toFixed(2), 8, pad);
  ctx.fillText(min.toFixed(2), 8, h - pad);

  info.textContent = "Laatste waarde: " + last + " ppm PO4";
}

drawChart(getData().reverse());
</script>

</body>
</html>
