<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salty Reef - Trends</title>

<style>
body { font-family: Arial; background:#0b1f2a; color:white; margin:0; padding:20px; }
.container { max-width:700px; margin:auto; }
.card { background:#112c3a; padding:20px; border-radius:12px; margin-bottom:15px; }
h1, h2 { margin-top:0; }
canvas { width:100%; height:240px; background:#0b1f2a; border-radius:10px; }
.small { color:#b9d7e0; font-size:14px; }
.button {
  display:block; text-align:center; padding:12px;
  border-radius:8px; text-decoration:none; margin-top:10px;
  background:#00c2ff; color:black; font-weight:bold;
}
</style>
</head>

<body>
<div class="container">

<div class="card">
  <h1>Salty Reef Trends</h1>
  <p class="small">Trends worden lokaal geladen vanaf dit apparaat.</p>
</div>

<div class="card">
  <h2>KH</h2>
  <canvas id="khChart"></canvas>
  <p id="khInfo" class="small"></p>
</div>

<div class="card">
  <h2>Calcium</h2>
  <canvas id="caChart"></canvas>
  <p id="caInfo" class="small"></p>
</div>

<div class="card">
  <h2>PO4</h2>
  <canvas id="po4Chart"></canvas>
  <p id="po4Info" class="small"></p>
</div>

<a class="button" href="../">Terug naar startpagina</a>

</div>

<script>
function getData(key){
  try {
    return JSON.parse(localStorage.getItem(key) || "[]");
  } catch(e) {
    return [];
  }
}

function normalize(data){
  return data
    .map(item => ({
      value: parseFloat(item.value),
      date: item.date || ""
    }))
    .filter(item => !isNaN(item.value))
    .reverse();
}

function drawChart(canvasId, infoId, data, unit){
  const canvas = document.getElementById(canvasId);
  const info = document.getElementById(infoId);
  const ctx = canvas.getContext("2d");

  canvas.width = canvas.clientWidth * 2;
  canvas.height = 240 * 2;

  const w = canvas.width;
  const h = canvas.height;
  const pad = 50;

  ctx.clearRect(0,0,w,h);

  ctx.strokeStyle = "#24495a";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(pad, pad);
  ctx.lineTo(pad, h - pad);
  ctx.lineTo(w - pad, h - pad);
  ctx.stroke();

  if(data.length < 2){
    info.textContent = "Minimaal 2 metingen nodig voor een grafiek. Gevonden: " + data.length;
    return;
  }

  const values = data.map(d => d.value);
  let min = Math.min(...values);
  let max = Math.max(...values);

  if(min === max){
    min -= 1;
    max += 1;
  }

  function x(i){
    return pad + (i / (data.length - 1)) * (w - pad * 2);
  }

  function y(v){
    return h - pad - ((v - min) / (max - min)) * (h - pad * 2);
  }

  ctx.strokeStyle = "#00c2ff";
  ctx.lineWidth = 4;
  ctx.beginPath();

  data.forEach((point, i) => {
    if(i === 0) ctx.moveTo(x(i), y(point.value));
    else ctx.lineTo(x(i), y(point.value));
  });

  ctx.stroke();

  ctx.fillStyle = "#00c2ff";
  data.forEach((point, i) => {
    ctx.beginPath();
    ctx.arc(x(i), y(point.value), 6, 0, Math.PI * 2);
    ctx.fill();
  });

  ctx.fillStyle = "#b9d7e0";
  ctx.font = "22px Arial";
  ctx.fillText(max.toFixed(3), 8, pad);
  ctx.fillText(min.toFixed(3), 8, h - pad);

  const first = data[0].value;
  const last = data[data.length - 1].value;
  const diff = +(last - first).toFixed(3);

  let trend = "stabiel";
  if(diff > 0) trend = "stijgend";
  if(diff < 0) trend = "dalend";

  info.textContent =
    data.length + " metingen • laatste: " + last + " " + unit +
    " • trend: " + trend + " (" + (diff > 0 ? "+" : "") + diff + ")";
}

const khData = normalize(getData("kh_notes"));
const caData = normalize(getData("ca_notes"));
const po4Data = normalize(getData("po4_notes"));

drawChart("khChart", "khInfo", khData, "dKH");
drawChart("caChart", "caInfo", caData, "ppm");
drawChart("po4Chart", "po4Info", po4Data, "ppm PO4");
</script>

</body>
</html>
